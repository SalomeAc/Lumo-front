<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Actualizar perfil | Lumo</title>
        <link rel="stylesheet" href="edit-profile.css" />
        <script type="module" src="./edit-profile.js"></script>
    </head>
    <body>
        <!-- Header barnav -->
        <div id="barnav-container"></div>
        <div class="update-container">
            <!-- Sidebar azul y footer -->
            <aside class="update-sidebar">
                <div class="footer">©2025 Lumo</div>
            </aside>
            <!-- Contenido principal -->
            <div class="update-content">
                <header class="update-header">
                    <div class="inline-back">
                        <a href="/user-profile/"><img src="/previous_black.png" alt="Volver" /></a>
                    </div>
                    <h2>Cambie su información de perfil o contraseña</h2>
                    <div class="header-info">
                        <p class="header-name">Nombre completo</p>
                        <p class="header-email">example@domain.com</p>
                    </div>
                </header>
                <nav class="tab-navigation">
                    <a href="/editprofile/" class="tab active">Perfil</a>
                    <a href="/security/" class="tab">Seguridad</a>
                </nav>
                <main>
                    <form class="update-form">
                        <div class="form-group">
                            <label for="nombre">Nombre</label>
                            <input
                                type="text"
                                id="nombre"
                                maxlength="10"
                                placeholder="Menos de 10 caracteres o igual a 10 caracteres"
                            />
                        </div>
                        <div class="form-group">
                            <label for="apellidos">Apellidos</label>
                            <input
                                type="text"
                                id="apellidos"
                                maxlength="10"
                                placeholder="Menos de 10 caracteres o igual a 10 caracteres"
                            />
                        </div>
                        <div class="form-group">
                            <label for="edad">Edad</label>
                            <input
                                type="number"
                                id="edad"
                                min="10"
                                max="112"
                                placeholder="Valor natural entre 10 y 112"
                            />
                        </div>
                        <div class="form-group">
                            <label for="correo">Correo</label>
                            <input
                                type="email"
                                id="correo"
                                placeholder="example@domain.com"
                            />
                        </div>
                        <button type="submit" class="update-btn">
                            Actualizar
                        </button>
                    </form>
                </main>
            </div>
        </div>
                <!-- Script para cargar el header dinámico y sus estilos -->
                <script type="module">
                    // Cargar el barnav reutilizable y luego ejecutar su JS y CSS
                    fetch('/components/barnav.html')
                        .then(r => r.text())
                        .then(html => {
                            document.getElementById('barnav-container').innerHTML = html;
                            // Cargar barnav.css dinámicamente si no está ya cargado
                            if (!document.getElementById('barnav-css')) {
                                const link = document.createElement('link');
                                link.rel = 'stylesheet';
                                link.href = '/components/barnav.css';
                                link.id = 'barnav-css';
                                document.head.appendChild(link);
                            }
                            // Ejecutar barnav.js manualmente después de insertar el HTML
                            import('/components/barnav.js');
                        });
                </script>
    </body>
</html>
